<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    
    <!-- הגדרות אפליקציה עבור אייפון ואנדרואיד -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="המשימות שלי">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/906/906334.png">

    <title>המשימות שלי</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --bg: #0f0f1a;
        --surface: #1a1a2e;
        --surface2: #22223b;
        --border: rgba(255,255,255,0.08);
        --text: #f0eff4;
        --text-dim: #888;
        --accent: #e63946;
        --accent2: #457b9d;
        --accent3: #a8dadc;
        --high: #e63946;
        --mid: #f4a261;
        --low: #52b788;
        --done-opacity: 0.35;
        --radius: 14px;
        --shadow: 0 4px 24px rgba(0,0,0,0.4);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

      body {
        font-family: 'Heebo', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        overflow-x: hidden;
      }

      /* BG texture */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at 20% 10%, rgba(69,123,157,0.12) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 80%, rgba(230,57,70,0.08) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(15,15,26,0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border);
        padding: 14px 20px 10px;
      }

      .header-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .app-title {
        font-size: 22px;
        font-weight: 900;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, var(--text) 0%, var(--accent3) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .stats {
        font-size: 12px;
        color: var(--text-dim);
        background: var(--surface2);
        padding: 4px 10px;
        border-radius: 20px;
        border: 1px solid var(--border);
      }

      .filter-bar {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        scrollbar-width: none;
        padding-bottom: 2px;
      }
      .filter-bar::-webkit-scrollbar { display: none; }

      .add-cat-inline-btn {
        flex-shrink: 0;
        margin-right: auto;
        border: 1px dashed rgba(255,255,255,0.2);
        background: transparent;
        color: var(--text-dim);
        padding: 5px 10px;
        border-radius: 20px;
        font-family: 'Heebo', sans-serif;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .add-cat-inline-btn:hover { border-color: var(--accent3); color: var(--accent3); }

      .quick-modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        z-index: 400;
        align-items: center;
        justify-content: center;
        padding: 20px;
        backdrop-filter: blur(4px);
      }
      .quick-modal-overlay.open { display: flex; }
      .quick-modal {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 24px 20px;
        width: 100%;
        max-width: 360px;
        animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
      }
      @keyframes popIn {
        from { opacity: 0; transform: scale(0.85); }
        to   { opacity: 1; transform: scale(1); }
      }
      .quick-modal-title {
        font-size: 17px;
        font-weight: 800;
        margin-bottom: 14px;
      }
      .quick-modal-row {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
      }
      .quick-modal-row input { flex: 1; }
      .color-picker {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }
      .color-swatch {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid transparent;
        cursor: pointer;
        transition: transform 0.15s;
      }
      .color-swatch.selected { border-color: white; transform: scale(1.15); }
      .quick-modal-actions { display: flex; gap: 8px; }
      .quick-modal-actions .btn-primary { margin-top: 0; flex: 1; padding: 12px; }
      .btn-cancel {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text-dim);
        border-radius: 12px;
        padding: 12px 16px;
        font-family: 'Heebo', sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .filter-btn {
        flex-shrink: 0;
        border: none;
        background: var(--surface2);
        color: var(--text-dim);
        padding: 5px 12px;
        border-radius: 20px;
        font-family: 'Heebo', sans-serif;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid transparent;
      }
      .filter-btn.active {
        background: var(--accent2);
        color: white;
        border-color: rgba(255,255,255,0.1);
      }

      main {
        position: relative;
        z-index: 1;
        padding: 16px;
        padding-bottom: 100px;
        max-width: 600px;
        margin: 0 auto;
      }

      .category-section {
        margin-bottom: 20px;
        animation: fadeUp 0.3s ease both;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .category-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        padding: 0 2px;
      }

      .category-name {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--text-dim);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .cat-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .cat-count {
        font-size: 11px;
        background: var(--surface2);
        padding: 2px 7px;
        border-radius: 10px;
        color: var(--text-dim);
      }

      .task-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 14px;
        margin-bottom: 8px;
        display: flex;
        align-items: flex-start;
        gap: 12px;
        transition: all 0.25s ease;
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }

      .task-card::before {
        content: '';
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        border-radius: 0 var(--radius) var(--radius) 0;
      }

      .task-card.high::before { background: var(--high); }
      .task-card.mid::before  { background: var(--mid); }
      .task-card.low::before  { background: var(--low); }

      .task-card.done {
        opacity: var(--done-opacity);
      }

      .check-btn {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid var(--border);
        background: transparent;
        cursor: pointer;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        margin-top: 1px;
      }

      .task-card.done .check-btn {
        background: var(--low);
        border-color: var(--low);
      }

      .check-btn svg { display: none; }
      .task-card.done .check-btn svg { display: block; }

      .task-body { flex: 1; min-width: 0; }

      .task-text {
        font-size: 15px;
        font-weight: 500;
        line-height: 1.4;
        word-break: break-word;
      }

      .task-card.done .task-text {
        text-decoration: line-through;
      }

      .task-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 5px;
        flex-wrap: wrap;
      }

      .badge {
        font-size: 10px;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 8px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      .badge.high { background: rgba(230,57,70,0.2); color: var(--high); }
      .badge.mid  { background: rgba(244,162,97,0.2); color: var(--mid); }
      .badge.low  { background: rgba(82,183,136,0.2); color: var(--low); }

      .task-date {
        font-size: 11px;
        color: var(--text-dim);
      }

      .delete-btn {
        background: transparent;
        border: none;
        color: var(--text-dim);
        cursor: pointer;
        padding: 2px;
        opacity: 0.8;
        flex-shrink: 0;
      }

      .empty-state {
        text-align: center;
        padding: 30px 20px;
        color: var(--text-dim);
        font-size: 14px;
      }

      .fab {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 200;
        background: linear-gradient(135deg, var(--accent) 0%, #c1121f 100%);
        color: white;
        border: none;
        border-radius: 50px;
        padding: 14px 28px;
        font-family: 'Heebo', sans-serif;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(230,57,70,0.5);
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s;
      }

      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        z-index: 300;
        align-items: flex-end;
        backdrop-filter: blur(4px);
      }
      .modal-overlay.open { display: flex; }

      .modal {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 24px 24px 0 0;
        padding: 24px 20px 36px;
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
      }

      @keyframes slideUp {
        from { transform: translateY(100%); }
        to   { transform: translateY(0); }
      }

      .modal-handle {
        width: 36px;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin: 0 auto 20px;
      }

      .modal-title {
        font-size: 18px;
        font-weight: 900;
        margin-bottom: 16px;
      }

      .field-label {
        font-size: 12px;
        font-weight: 700;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 6px;
      }

      .field { margin-bottom: 14px; }

      input[type="text"], select {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 11px 14px;
        color: var(--text);
        font-family: 'Heebo', sans-serif;
        font-size: 15px;
        outline: none;
      }

      .urgency-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .urg-btn {
        padding: 9px;
        border-radius: 10px;
        border: 2px solid var(--border);
        background: var(--surface2);
        color: var(--text-dim);
        font-family: 'Heebo', sans-serif;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        text-align: center;
      }
      .urg-btn.selected-high { border-color: var(--high); color: var(--high); background: rgba(230,57,70,0.1); }
      .urg-btn.selected-mid  { border-color: var(--mid);  color: var(--mid);  background: rgba(244,162,97,0.1); }
      .urg-btn.selected-low  { border-color: var(--low);  color: var(--low);  background: rgba(82,183,136,0.1); }

      .btn-primary {
        width: 100%;
        background: linear-gradient(135deg, var(--accent), #c1121f);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 14px;
        font-family: 'Heebo', sans-serif;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 6px;
      }

      .selection-bar {
        position: sticky;
        top: 72px;
        z-index: 90;
        background: var(--accent2);
        padding: 10px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .archive-toggle {
        position: fixed;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        z-index: 150;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-left: none;
        border-radius: 0 10px 10px 0;
        padding: 16px 7px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        color: var(--text-dim);
        writing-mode: vertical-rl;
        font-size: 11px;
        font-weight: 700;
      }

      .archive-sidebar {
        position: fixed;
        top: 0;
        left: -320px;
        width: 300px;
        height: 100dvh;
        background: var(--surface);
        border-right: 1px solid var(--border);
        z-index: 500;
        transition: left 0.3s ease;
        display: flex;
        flex-direction: column;
      }
      .archive-sidebar.open { left: 0; }

      .archive-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 490;
      }
      .archive-overlay.open { display: block; }
    </style>
</head>
<body>

<div class="archive-overlay" id="archiveOverlay"></div>

<aside class="archive-sidebar" id="archiveSidebar">
    <div style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;">
        <span style="font-weight: 900;">🗂 ארכיון</span>
        <button id="archiveClose" style="background:none; border:none; color:var(--text-dim); cursor:pointer;">✕</button>
    </div>
    <div id="archiveBody" style="flex:1; overflow-y:auto; padding:12px;"></div>
    <button id="archiveClearBtn" style="margin:12px; padding:10px; background:transparent; border:1px solid var(--high); color:var(--high); border-radius:10px; font-family:'Heebo'; cursor:pointer;">🗑 מחק הכל</button>
</aside>

<button class="archive-toggle" id="archiveToggle">
    <span id="archCount" style="writing-mode: horizontal-tb; background:var(--accent); color:white; border-radius:10px; padding:2px 5px; font-size:10px; display:none;"></span>
    ארכיון
</button>

<header>
    <div class="header-top">
        <div class="app-title">✦ המשימות שלי</div>
        <div class="stats" id="stats">0 פתוחות</div>
    </div>
    <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-filter="all">הכל</button>
        <button class="filter-btn" data-filter="high">🔴 דחוף</button>
        <button class="add-cat-inline-btn" id="quickAddCatBtn">＋ תחום חדש</button>
    </div>
</header>

<div class="selection-bar" id="selectionBar" style="display:none">
    <span id="selectionCount" style="color:white; font-size:14px; font-weight:700;"></span>
    <div style="display:flex; gap:8px;">
        <button onclick="markSelectedDone()" style="background:rgba(255,255,255,0.2); color:white; border:none; padding:6px 12px; border-radius:8px; font-family:'Heebo'; cursor:pointer;">→ ארכיון</button>
        <button onclick="clearSelection()" style="background:none; color:white; border:none; cursor:pointer;">✕</button>
    </div>
</div>

<main id="taskList"></main>

<button class="fab" id="fabBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    משימה חדשה
</button>

<!-- MODALS -->
<div class="quick-modal-overlay" id="quickCatModal">
    <div class="quick-modal">
        <div class="quick-modal-title">➕ תחום חדש</div>
        <input type="text" id="quickCatName" placeholder="שם התחום..." style="width:100%; margin-bottom:15px; padding:10px; background:var(--surface2); border:1px solid var(--border); color:white; border-radius:10px;">
        <div class="color-picker" id="colorPicker"></div>
        <div class="quick-modal-actions">
            <button class="btn-cancel" id="cancelQuickCat">ביטול</button>
            <button class="btn-primary" id="saveQuickCat">הוסף</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-title">משימה חדשה</div>
        <div class="field">
            <div class="field-label">תיאור</div>
            <input type="text" id="taskText" placeholder="מה צריך לעשות?">
        </div>
        <div class="field">
            <div class="field-label">נושא</div>
            <select id="taskCat"></select>
        </div>
        <div class="field">
            <div class="field-label">דחיפות</div>
            <div class="urgency-grid">
                <button class="urg-btn" data-urg="high">🔴 גבוהה</button>
                <button class="urg-btn" data-urg="mid">🟡 בינונית</button>
                <button class="urg-btn" data-urg="low">🟢 נמוכה</button>
            </div>
        </div>
        <button class="btn-primary" id="saveTask">שמור משימה</button>
        <button id="closeModal" style="width:100%; background:none; border:none; color:var(--text-dim); margin-top:10px; cursor:pointer;">ביטול</button>
    </div>
</div>

<script>
const CAT_COLORS = ['#457b9d','#e76f51','#2a9d8f','#e9c46a','#a786df','#f4a261','#52b788','#e63946','#90e0ef','#c77dff'];
let state = loadState();
let activeFilter = 'all';
let selectedUrgency = 'mid';
let selectedTasks = new Set();

function loadState() {
    const s = JSON.parse(localStorage.getItem('taskapp_v2'));
    return s || {
        categories: [
            { id: 'work', name: 'עבודה', color: '#457b9d' },
            { id: 'personal', name: 'אישי', color: '#e76f51' },
            { id: 'study', name: 'לימודים', color: '#e9c46a' }
        ],
        tasks: [],
        nextId: 1
    };
}

function saveState() { localStorage.setItem('taskapp_v2', JSON.stringify(state)); }

function render() {
    renderFilterBar();
    renderTasks();
    renderStats();
    updateArchiveCount();
}

function renderStats() {
    const open = state.tasks.filter(t => !t.done).length;
    document.getElementById('stats').textContent = `${open} פתוחות`;
}

function renderFilterBar() {
    const bar = document.getElementById('filterBar');
    const existing = bar.querySelectorAll('.filter-btn');
    existing.forEach(b => { if(b.dataset.filter.startsWith('cat_')) b.remove(); });

    state.categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.filter = `cat_${cat.id}`;
        btn.innerHTML = `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${cat.color};margin-left:4px;"></span>${cat.name}`;
        if (activeFilter === `cat_${cat.id}`) btn.classList.add('active');
        bar.appendChild(btn);
    });
}

function renderTasks() {
    const container = document.getElementById('taskList');
    let filtered = state.tasks.filter(t => !t.done);
    
    if (activeFilter === 'high') filtered = filtered.filter(t => t.urgency === 'high');
    else if (activeFilter.startsWith('cat_')) {
        const catId = activeFilter.replace('cat_','');
        filtered = filtered.filter(t => t.catId === catId);
    }

    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">אין משימות כאן</div>';
        return;
    }

    const html = filtered.map(t => {
        const dateStr = new Date(t.created).toLocaleDateString('he-IL', {day:'numeric', month:'short'});
        return `
            <div class="task-card ${t.urgency} ${selectedTasks.has(t.id)?'selected':''}" onclick="toggleSelect(${t.id}, event)">
                <button class="check-btn ${selectedTasks.has(t.id)?'checked':''}">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
                <div class="task-body">
                    <div class="task-text">${t.text}</div>
                    <div class="task-meta">
                        <span class="badge ${t.urgency}">${t.urgency}</span>
                        <span class="task-date">${dateStr}</span>
                    </div>
                </div>
                <button class="delete-btn" onclick="deleteTask(${t.id}, event)">✕</button>
            </div>`;
    }).join('');
    container.innerHTML = html;
}

function toggleSelect(id, e) {
    if (selectedTasks.has(id)) selectedTasks.delete(id);
    else selectedTasks.add(id);
    updateSelectionBar();
    renderTasks();
}

function updateSelectionBar() {
    const bar = document.getElementById('selectionBar');
    if (selectedTasks.size > 0) {
        bar.style.display = 'flex';
        document.getElementById('selectionCount').textContent = `${selectedTasks.size} מסומנות`;
    } else bar.style.display = 'none';
}

function markSelectedDone() {
    state.tasks.forEach(t => { if(selectedTasks.has(t.id)) t.done = true; });
    selectedTasks.clear();
    saveState(); render(); updateSelectionBar();
}

function deleteTask(id, e) {
    e.stopPropagation();
    state.tasks = state.tasks.filter(t => t.id !== id);
    saveState(); render();
}

function clearSelection() { selectedTasks.clear(); updateSelectionBar(); renderTasks(); }

// Modal Logic
const modal = document.getElementById('addModal');
document.getElementById('fabBtn').onclick = () => {
    modal.classList.add('open');
    const sel = document.getElementById('taskCat');
    sel.innerHTML = state.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
};
document.getElementById('closeModal').onclick = () => modal.classList.remove('open');

document.querySelectorAll('.urg-btn').forEach(btn => {
    btn.onclick = () => {
        selectedUrgency = btn.dataset.urg;
        document.querySelectorAll('.urg-btn').forEach(b => {
            b.className = 'urg-btn';
            if (b.dataset.urg === selectedUrgency) b.classList.add(`selected-${selectedUrgency}`);
        });
    };
});

document.getElementById('saveTask').onclick = () => {
    const text = document.getElementById('taskText').value.trim();
    if (!text) return;
    state.tasks.push({
        id: state.nextId++,
        text,
        catId: document.getElementById('taskCat').value,
        urgency: selectedUrgency,
        done: false,
        created: Date.now()
    });
    saveState(); render();
    modal.classList.remove('open');
    document.getElementById('taskText').value = '';
};

// Quick Category
const quickCatModal = document.getElementById('quickCatModal');
let quickColor = CAT_COLORS[0];

document.getElementById('quickAddCatBtn').onclick = () => {
    quickCatModal.classList.add('open');
    const picker = document.getElementById('colorPicker');
    picker.innerHTML = CAT_COLORS.map(c => `<div class="color-swatch" style="background:${c}" onclick="quickColor='${c}'"></div>`).join('');
};

document.getElementById('saveQuickCat').onclick = () => {
    const name = document.getElementById('quickCatName').value.trim();
    if (!name) return;
    state.categories.push({ id: 'cat_'+Date.now(), name, color: quickColor });
    saveState(); render();
    quickCatModal.classList.remove('open');
};
document.getElementById('cancelQuickCat').onclick = () => quickCatModal.classList.remove('open');

// Archive
const archSidebar = document.getElementById('archiveSidebar');
document.getElementById('archiveToggle').onclick = () => {
    archSidebar.classList.add('open');
    document.getElementById('archiveOverlay').classList.add('open');
    const done = state.tasks.filter(t => t.done);
    document.getElementById('archiveBody').innerHTML = done.map(t => `
        <div style="background:var(--surface2); padding:10px; border-radius:10px; margin-bottom:8px; display:flex; justify-content:space-between;">
            <span style="text-decoration:line-through; color:var(--text-dim);">${t.text}</span>
            <button onclick="restoreTask(${t.id})" style="background:none; border:none; color:var(--low); cursor:pointer;">↩</button>
        </div>
    `).join('') || 'הארכיון ריק';
};

function restoreTask(id) {
    const t = state.tasks.find(t => t.id === id);
    if(t) t.done = false;
    saveState(); render();
    document.getElementById('archiveToggle').click(); 
}

document.getElementById('archiveClose').onclick = () => {
    archSidebar.classList.remove('open');
    document.getElementById('archiveOverlay').classList.remove('open');
};

function updateArchiveCount() {
    const count = state.tasks.filter(t => t.done).length;
    const el = document.getElementById('archCount');
    if (count > 0) { el.textContent = count; el.style.display = 'block'; }
    else el.style.display = 'none';
}

document.getElementById('filterBar').onclick = (e) => {
    if (e.target.classList.contains('filter-btn')) {
        activeFilter = e.target.dataset.filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === e.target));
        render();
    }
};

render();
</script>
</body>
</html>
